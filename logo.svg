<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Academic Gold Gradient -->
    <linearGradient id="studyGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B3E" />
      <stop offset="30%" stop-color="#CBB57B" />
      <stop offset="50%" stop-color="#F3E7BE" />
      <stop offset="70%" stop-color="#CBB57B" />
      <stop offset="100%" stop-color="#84642C" />
    </linearGradient>

    <!-- Deep Midnight Academic Navy -->
    <linearGradient id="academicNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3557" />
      <stop offset="60%" stop-color="#11223F" />
      <stop offset="100%" stop-color="#091428" />
    </linearGradient>

    <!-- Warm Golden Light / Spotlight Glow -->
    <linearGradient id="glowLamp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9E6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#CBB57B" stop-opacity="0.0" />
    </linearGradient>

    <!-- Drop Shadow Filter for Realistic Depth -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#081225" flood-opacity="0.25" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#84642C" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- BACKGROUND: Elegant Clean Rounded Shield Shield Boundary -->
  <g filter="url(#premiumShadow)">
    <path d="M256,15 C370,15 455,55 465,180 C465,310 365,410 256,497 C147,410 47,310 47,180 C57,55 142,15 256,15 Z" 
          fill="url(#academicNavy)" 
          stroke="url(#studyGold)" 
          stroke-width="8" 
          stroke-linejoin="round" />
  </g>

  <!-- BACKGROUND LIGHTING: Vertical Cone of Enlightenment -->
  <path d="M256,110 L100,450 L412,450 Z" fill="url(#glowLamp)" opacity="0.6" />

  <!-- THE "STUDY" GEOMETRY: Academic Laurel Wreath, Graduation Cap & Open Book -->
  
  <!-- 1. Laurel Wreath of Academic Excellence (Symbol of Achievements and High Grades) -->
  <g stroke="url(#studyGold)" fill="none" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <!-- Left Wreath Branch -->
    <path d="M125,320 C95,240 135,140 205,115" />
    <!-- Left Wreath Leaves -->
    <path d="M125,300 C110,290 105,270 115,260 C125,270 130,290 125,300 Z" fill="url(#studyGold)" />
    <path d="M117,250 C101,241 94,222 103,211 C114,219 120,238 117,250 Z" fill="url(#studyGold)" />
    <path d="M121,200 C107,189 103,170 114,158 C125,164 129,183 121,200 Z" fill="url(#studyGold)" />
    <path d="M139,158 C129,144 128,124 141,114 C151,122 151,142 139,158 Z" fill="url(#studyGold)" />
    <path d="M168,127 C161,111 164,91 178,82 C186,93 182,113 168,127 Z" fill="url(#studyGold)" />

    <!-- Right Wreath Branch -->
    <path d="M387,320 C417,240 377,140 307,115" />
    <!-- Right Wreath Leaves -->
    <path d="M387,300 C402,290 407,270 397,260 C387,270 382,290 387,300 Z" fill="url(#studyGold)" />
    <path d="M395,250 C411,241 418,222 409,211 C398,219 392,238 395,250 Z" fill="url(#studyGold)" />
    <path d="M391,200 C405,189 409,170 398,158 C387,164 383,183 391,200 Z" fill="url(#studyGold)" />
    <path d="M373,158 C383,144 384,124 371,114 C361,122 361,142 373,158 Z" fill="url(#studyGold)" />
    <path d="M344,127 C351,111 348,91 334,82 C326,93 330,113 344,127 Z" fill="url(#studyGold)" />
  </g>

  <!-- 2. The Open Wisdom Textbook (Core Foundation of Study & IELTS Research) -->
  <g transform="translate(0, 15)">
    <!-- Book Outer Cover Backing -->
    <path d="M110,385 C145,355 215,355 256,375 C297,355 367,355 402,385 L402,280 C367,250 297,250 256,270 C215,250 145,250 110,280 Z" 
          fill="#0B1527" 
          stroke="url(#studyGold)" 
          stroke-width="5" 
          stroke-linejoin="round" />

    <!-- Book Pages Stack Effect (Multiple Sheets) -->
    <path d="M116,373 C150,345 218,345 256,363 C294,345 362,345 396,373 L396,268 C362,240 294,240 256,258 C218,240 150,240 116,268 Z" 
          fill="#FFFFFF" />

    <!-- Top Pristine Page Sheet -->
    <path d="M120,368 C153,341 220,341 256,359 C292,341 359,341 392,368 L392,263 C359,236 292,236 256,254 C220,236 153,236 120,263 Z" 
          fill="#FAF8F3" 
          stroke="#D4CEBF" 
          stroke-width="1.5" />

    <!-- Book Spine / Center Stitch Joint -->
    <path d="M256,254 L256,361" stroke="url(#studyGold)" stroke-width="4.5" stroke-linecap="round" />

    <!-- Left Page Study Text Lines (Simulating dynamic research & structured learning) -->
    <g stroke="url(#academicNavy)" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <line x1="145" y1="280" x2="230" y2="280" />
      <line x1="145" y1="298" x2="215" y2="298" />
      <line x1="145" y1="316" x2="230" y2="316" />
      <line x1="145" y1="334" x2="195" y2="334" />
    </g>

    <!-- Right Page Study Text Lines -->
    <g stroke="url(#academicNavy)" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <line x1="282" y1="280" x2="367" y2="280" />
      <line x1="282" y1="298" x2="352" y2="298" />
      <line x1="282" y1="316" x2="367" y2="316" />
      <line x1="282" y1="334" x2="322" y2="334" />
    </g>

    <!-- Glowing Wisdom Star rising from the Book Center -->
    <polygon points="256,218 260,228 271,228 262,235 265,246 256,239 247,246 250,235 241,228 252,228" fill="url(#studyGold)" />
  </g>

  <!-- 3. Graduation Mortarboard Cap (Sublime Symbol of High-Tier College/University & IELTS Success) -->
  <g transform="translate(0, -5)" filter="url(#premiumShadow)">
    <!-- Cap Base Headband Band underneath -->
    <path d="M192,185 C192,215 320,215 320,185" fill="none" stroke="url(#studyGold)" stroke-width="12" stroke-linecap="round" />
    <path d="M197,185 L197,208 C197,225 315,225 315,208 L315,185 Z" fill="#11223F" stroke="url(#studyGold)" stroke-width="4.5" />

    <!-- Diamond Diamond Top Board -->
    <polygon points="256,95 385,140 256,185 127,140" 
             fill="#1A2E4C" 
             stroke="url(#studyGold)" 
             stroke-width="7.5" 
             stroke-linejoin="round" />

    <!-- Top Cap Button Dome -->
    <ellipse cx="256" cy="140" rx="9" ry="6" fill="url(#studyGold)" />

    <!-- Graceful Golden Graduation Tassel hanging down the Left side of cap -->
    <path d="M256,140 C215,145 158,185 158,212" 
          fill="none" 
          stroke="url(#studyGold)" 
          stroke-width="4.5" 
          stroke-linecap="round" />

    <!-- Tassel Fringe Pendant -->
    <polygon points="158,212 153,230 163,230" fill="url(#studyGold)" stroke="url(#studyGold)" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- High Achievers Constellation Stars flanking the cap (Bands 8.0, 8.5, 9.0) -->
  <g fill="url(#studyGold)">
    <!-- Top-Left Star -->
    <polygon points="150,75 153,82 161,82 154,87 156,95 150,90 144,95 146,87 139,82 147,82" opacity="0.95" />
    <!-- Top-Right Star -->
    <polygon points="362,75 365,82 373,82 366,87 368,95 362,90 356,95 358,87 351,82 359,82" opacity="0.95" />
  </g>
</svg>
